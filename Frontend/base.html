<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>{{ title|default("Medical Report AI") }}</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Your custom CSS (must be inside static folder) -->
    <link
      rel="stylesheet"
      href="/static/style.css"
    />

    <!-- Tailwind CDN (last so it can override Bootstrap if needed) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Optional: extra head content from child pages -->
    {% block head %}{% endblock %}
  </head>
  <body class="bg-gray-50 min-h-screen font-sans">
    <!-- Common Navbar / Header (from partials) -->
    {% include "partials/navbar.html" %}

    <!-- Main content area – this is where child pages will inject their content -->
    {% block content %}
    <!-- Fallback if child template forgets to define block -->
    <div class="container py-10 text-center text-gray-500">
      Page content goes here
    </div>
    {% endblock %}

    <!-- Bootstrap JS (bundle includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>

    <!-- Global / page-specific JS (move these files to static/js/) -->

    <!-- Optional: page-specific scripts block -->
    {% block scripts %}{% endblock %}
  </body>
</html>
