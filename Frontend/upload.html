{% extends "base.html" %} {% block content %}
<body class="bg-gray-50 min-h-screen font-sans">
  <!-- Stepper -->
  <div class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-4 sm:px-6">
      <div class="flex items-center justify-between">
        <div class="flex flex-col items-center flex-1">
          <div
            class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-semibold text-lg relative"
          >
            <i class="fas fa-file-medical absolute text-xl"></i>
          </div>
          <p class="mt-2 text-sm font-medium text-blue-600">Upload Report</p>
        </div>

        <div class="flex-1 h-1 bg-gray-200 mx-2">
          <div class="h-full bg-gray-300 w-full rounded"></div>
        </div>

        <div class="flex flex-col items-center flex-1 opacity-60">
          <div
            class="w-10 h-10 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center font-semibold text-lg"
          >
            <i class="fas fa-user-md"></i>
          </div>
          <p class="mt-2 text-sm font-medium text-gray-500">Patient Context</p>
        </div>

        <div class="flex-1 h-1 bg-gray-200 mx-2"></div>

        <div class="flex flex-col items-center flex-1 opacity-60">
          <div
            class="w-10 h-10 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center font-semibold text-lg"
          >
            <i class="fas fa-brain"></i>
          </div>
          <p class="mt-2 text-sm font-medium text-gray-500">AI Analysis</p>
        </div>

        <div class="flex-1 h-1 bg-gray-200 mx-2"></div>

        <div class="flex flex-col items-center flex-1 opacity-60">
          <div
            class="w-10 h-10 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center font-semibold text-lg"
          >
            <i class="fas fa-shield-check"></i>
          </div>
          <p class="mt-2 text-sm font-medium text-gray-500">Verification</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="max-w-4xl mx-auto px-4 py-10 sm:px-6 lg:px-8">
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold text-gray-900">Upload Medical Report</h1>
      <p class="mt-3 text-lg text-gray-600">
        Upload or paste a medical report for AI-powered analysis with
        hallucination control
      </p>
    </div>

    <!-- Drop Zone / Text Area -->

    <form
      id="uploadForm"
      enctype="multipart/form-data"
      class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-lg"
    >
      <div class="mb-8 text-center">
        <label
  for="fileInput"
  class="block cursor-pointer"
>
  <div
    id="dropArea"
    class="border-2 border-dashed border-gray-400 rounded-lg p-12 hover:border-indigo-500 transition text-center"
  >
    <i class="fas fa-cloud-upload-alt text-6xl text-gray-400 mb-4"></i>

    <p class="text-lg font-semibold text-gray-700">
      Click to upload medical report
    </p>

    <p class="text-sm text-gray-500 mt-2">
      PDF files only
    </p>
  </div>
</label>
        <input
          type="file"
          id="fileInput"
          name="file"
          accept=".pdf"
          class="hidden"
        />
      </div>

      <button
        type="submit"
        id="submitBtn"
        class="w-full py-4 bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold rounded-xl hover:shadow-xl transition disabled:opacity-50"
      >
        Analyze Report
      </button>
    </form>

    <div
      id="result"
      class="mt-8 text-center"
    ></div>

    
  </div>
</body>
<script src="/static/js/upload.js"></script>

{% endblock %}
